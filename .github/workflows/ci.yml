name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >
          dotnet test tests/CodeExplorer.Core.Tests
          --no-build -c Release
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/

  publish-cli:
    name: Publish CLI (${{ matrix.rid }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, win-x64, win-arm64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish src/CodeExplorer.Cli
          -r ${{ matrix.rid }}
          -c Release
          --self-contained
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codemunch-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/

  benchmark:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run on main pushes — not on every PR to save CI minutes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run benchmarks
        run: >
          dotnet run --project tests/CodeExplorer.Benchmarks
          -c Release
          -- --exporters json markdown --artifacts BenchmarkArtifacts

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkArtifacts/
