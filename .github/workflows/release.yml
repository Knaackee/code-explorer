name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

permissions:
  contents: write

jobs:
  build-test-pack:
    name: Build, Test, Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test tests/CodeExplorer.Core.Tests --no-build -c Release

      - name: Pack CodeExplorer.Core
        run: >
          dotnet pack src/CodeExplorer.Core/CodeExplorer.Core.csproj
          --no-build -c Release
          -o artifacts/nuget
          /p:ContinuousIntegrationBuild=true

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/nuget/*.nupkg

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet nuget push artifacts/nuget/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  publish-cli-assets:
    name: Build CLI Assets (${{ matrix.rid }})
    runs-on: ubuntu-latest
    needs: build-test-pack
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, win-x64, win-arm64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish src/CodeExplorer.Cli/CodeExplorer.Cli.csproj
          -r ${{ matrix.rid }}
          -c Release
          --self-contained
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o artifacts/cli/${{ matrix.rid }}

      - name: Archive asset
        shell: bash
        run: |
          mkdir -p artifacts/release
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            cp artifacts/cli/${{ matrix.rid }}/cxp.exe artifacts/release/cxp-${{ matrix.rid }}.exe
          else
            cp artifacts/cli/${{ matrix.rid }}/cxp artifacts/release/cxp-${{ matrix.rid }}
            chmod +x artifacts/release/cxp-${{ matrix.rid }}
          fi

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.rid }}
          path: artifacts/release/*

  create-github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: publish-cli-assets

    steps:
      - name: Download all CLI assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: cli-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
